# nginx front for mcp.forge.example.
#
# Terminates TLS via Let's Encrypt (certbot's --nginx installer wires
# the ssl_certificate blocks below when it runs). Proxies to the
# forge-mcp Streamable HTTP transport on 127.0.0.1:8765.
#
# Streamable HTTP notes (CW-MCP-1-B):
#   - The transport uses HTTP/1.1 chunked responses for streaming.
#   - Buffering must be OFF so events reach the client immediately.
#   - Idle timeouts need to be long — an MCP session can hold the
#     connection open across many tool calls.
#   - Forward Authorization verbatim: forge-mcp reads it per-request.

server {
  listen 80;
  server_name mcp.forge.example;

  # certbot writes this challenge location; keep it under HTTP.
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Everything else → HTTPS.
  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name mcp.forge.example;

  # certbot fills these in.
  ssl_certificate     /etc/letsencrypt/live/mcp.forge.example/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/mcp.forge.example/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  # Health probe — cheap unauthenticated readiness check.
  location = /healthz {
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # MCP Streamable HTTP endpoint.
  location /mcp {
    proxy_pass http://127.0.0.1:8765;
    proxy_http_version 1.1;

    # Streamable HTTP — no buffering, long idle allowed.
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # Forward all client headers verbatim. Authorization is what
    # forge-mcp reads per-request (CW-MCP-1-B).
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass_request_headers on;

    # Streamable HTTP uses upgrade/keep-alive semantics.
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
